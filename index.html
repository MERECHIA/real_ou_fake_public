
<!DOCTYPE html> 
<html lang="pt-BR"> 

<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <link rel="stylesheet" href="style.css"> 
    <title>REAL OU FAKE?</title> 
</head> 

<body> 

    <div id ="tela-inicial" class="container"> 
        
        <h1>REAL OU FAKE?</h1> 
        <button id="comecar-btn" onclick="comecarJogo()">
            COMEÇAR
        </button>
    
    </div>

    <div id ="tela-jogo" class="container escondido">
        
        <h1>REAL OU FAKE?</h1>

        <div id="imagem"> 
            <img src=" " alt="img"> 
        </div> 
        
        <div id="botoes"> 
            <button id="real" onclick="verificar('real')">REAL</button> 
            <button id="fake" onclick="verificar('fake')">FAKE</button> 
        </div> 
        <p id="result"></p>

        <button id="btn-continuar" onclick="continuar()" style="display:none;">
            CONTINUAR
        </button> 
    
    </div>
    
    <div id ="tela-final" class="container escondido">
        <h2 id="resultado-final"></h2>
        <p id="feedback-ia"></p>
        <button onclick="reiniciarJogo()">REINICIAR</button>
           
    </div> 

    <script type="module" src="js/main.js"></script> 

</body> 
</html>
