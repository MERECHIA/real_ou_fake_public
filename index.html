<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-eval' 'unsafe-inline';">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <title>REAL OU FAKE?</title>
</head>
<body>


  <div id="camera-wrapper">
    <video id="camera" autoplay muted playsinline></video>
    <canvas id="camera-canvas"></canvas>
    <div id="camera-status-bar">
      <span id="status-camera">Aproxime-se para começar</span>
    </div>
  </div>

  
  <div id="tela-inicial" class="tela ativa">

    <div class="hdr">
      <div class="hdr-logo">
        <span class="hdr-real">REAL</span>
        <span class="hdr-sep">ou</span>
        <span class="hdr-fake">FAKE</span>
      </div>
      <div class="hdr-right">
        <div class="live-dot" id="live-dot"></div>
        <span id="live-txt">Câmera</span>
      </div>
    </div>

    <div class="inicial-hero">
      <div class="hero-num" aria-hidden="true">?</div>
      <div class="hero-titulo">
        <span class="hero-real">REAL</span>
        <span class="hero-ou">ou</span>
        <span class="hero-fake">FAKE?</span>
      </div>
      <p class="hero-sub">Você consegue distinguir uma fotografia real de uma imagem criada por inteligência artificial?</p>
    </div>

    <div class="inicial-footer">
      <span class="det-label" id="status-camera-label">Aguardando</span>
      <div class="prog-wrap">
        <div class="prog-fill" id="progress-bar"></div>
      </div>
    </div>

  </div>

  
  <div id="tela-jogo" class="tela escondida">

    <div class="hdr">
      <div class="hdr-logo">
        <span class="hdr-real">REAL</span>
        <span class="hdr-sep">ou</span>
        <span class="hdr-fake">FAKE</span>
      </div>
      <div class="hdr-right" style="flex-direction:column; align-items:flex-end; gap:4px;">
        <span id="img-contador" class="num-img">Imagem 1 / 5</span>
        <div id="score-track" class="score-dots"></div>
      </div>
    </div>

    <div class="img-area">
      <img id="imagem-principal" src="" alt="Imagem para classificar">
      <div class="scan-line"></div>
      <div id="feedback-overlay" class="fov">
        <span class="fov-icone" id="fov-icone"></span>
        <span class="fov-word"  id="fov-word"></span>
      </div>
    </div>

    <div class="btn-row">
      <button id="btn-real" class="btn-rf real">✓ REAL</button>
      <button id="btn-fake" class="btn-rf fake">✕ FAKE</button>
    </div>

    <div class="jogo-footer">
      <div class="footer-esquerda">
        <span id="result" class="res-txt"></span>
        <!-- Dica exibida apenas quando a resposta é errada -->
        <span id="dica-imagem" class="dica-txt"></span>
      </div>
      <button id="btn-continuar" class="btn-cont">Continuar →</button>
    </div>

  </div>

  
  <div id="tela-final" class="tela escondida">

    <div class="hdr">
      <div class="hdr-logo">
        <span class="hdr-real">REAL</span>
        <span class="hdr-sep">ou</span>
        <span class="hdr-fake">FAKE</span>
      </div>
      <div class="hdr-right">
        <span class="num-img">Resultado</span>
      </div>
    </div>

    <div class="final-hero">
      <div class="final-ghost" id="final-ghost" aria-hidden="true">0</div>
      <div style="position:relative;z-index:1;">
        <span class="final-score" id="resultado-final">0 <span class="final-den">/ 5</span></span>
      </div>
      <p class="final-label">respostas corretas</p>
    </div>

    <div id="resultado-barra" class="barra"></div>

    <div class="final-footer">
      <div class="ia-sep">
        <div class="ia-line"></div>
        <span class="ia-txt">Análise por IA</span>
        <div class="ia-line"></div>
      </div>
      <div id="feedback-ia" class="feedback-ia">
        <span class="typing-dots"><span></span><span></span><span></span></span>
      </div>
      <p class="hint">Aproxime-se para jogar novamente</p>
    </div>

  </div>

  <script src="js/libs/ml5.min.js" type="text/javascript"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
