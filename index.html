<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="stylesheet" href="style.css">
  <title>REAL OU FAKE?</title>
</head>
<body>

  <!-- ===================== TELA INICIAL ===================== -->
  <div id="tela-inicial" class="tela ativa">

    <div class="hdr">
      <div class="hdr-logo">
        <span class="hdr-real">REAL</span>
        <span class="hdr-sep">ou</span>
        <span class="hdr-fake">FAKE</span>
      </div>
      <span class="hdr-tag">Jogo</span>
    </div>

    <div class="color-bar"></div>

    <div class="inicial-hero">
      <div class="ghost-q" aria-hidden="true">?</div>
      <div class="hero-titulo">
        <span class="hero-real">REAL</span>
        <span class="hero-ou">ou</span>
        <span class="hero-fake">FAKE?</span>
      </div>
      <p class="hero-sub">Você consegue distinguir uma foto real de uma imagem criada por inteligência artificial?</p>
      <button id="btn-comecar" class="btn-comecar">COMEÇAR →</button>
    </div>

    <!-- Barra preta no bottom da tela inicial -->
    <div class="jogo-bottom-bar">
      <div class="color-bar"></div>
    </div>

  </div>

  <!-- ===================== TELA JOGO ===================== -->
  <div id="tela-jogo" class="tela escondida">

    <div class="hdr">
      <div class="hdr-logo">
        <span class="hdr-real">REAL</span>
        <span class="hdr-sep">ou</span>
        <span class="hdr-fake">FAKE</span>
      </div>
      <div class="hdr-direita">
        <div class="hdr-info">
          <span id="img-contador" class="hdr-tag">Imagem 1 / 10</span>
          <div id="score-track" class="score-dots"></div>
        </div>
        <button id="btn-reiniciar-jogo" class="btn-reiniciar-hdr">↺ REINICIAR</button>
      </div>
    </div>

    <div class="color-bar"></div>

    <div class="img-area">
      <!-- img-inner isola o overlay dentro da imagem, sem vazar -->
      <div class="img-inner">
        <img id="imagem-principal" src="" alt="Imagem para classificar">
        <div class="scan-line"></div>
        <div id="feedback-overlay" class="fov">
          <div class="fov-top">
            <span class="fov-icone" id="fov-icone"></span>
            <span class="fov-word"  id="fov-word"></span>
          </div>
          <div class="fov-dica" id="fov-dica">
            <span class="fov-dica-label">IA</span>
            <span class="fov-dica-txt" id="fov-dica-txt">Analisando imagem...</span>
          </div>
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button id="btn-real" class="btn-rf real">✓ REAL</button>
      <button id="btn-fake" class="btn-rf fake">✕ FAKE</button>
    </div>

    <div class="jogo-footer">
      <div class="jogo-footer-topo">
        <span id="result" class="res-txt"></span>
        <button id="btn-continuar" class="btn-cont">CONTINUAR →</button>
      </div>
      <div class="dica-rodape" id="dica-rodape">
        <span class="dica-rodape-label">Análise por IA</span>
        <span class="dica-rodape-txt" id="dica-rodape-txt">Analisando imagem...</span>
      </div>
    </div>

    <div class="jogo-bottom-bar">
      <div class="color-bar"></div>
    </div>

  </div>

  <!-- ===================== TELA FINAL ===================== -->
  <div id="tela-final" class="tela escondida">

    <div class="hdr">
      <div class="hdr-logo">
        <span class="hdr-real">REAL</span>
        <span class="hdr-sep">ou</span>
        <span class="hdr-fake">FAKE</span>
      </div>
      <span class="hdr-tag">Resultado</span>
    </div>

    <div class="color-bar"></div>

    <div class="final-hero">
      <div class="final-ghost" id="final-ghost" aria-hidden="true">0</div>
      <div style="position:relative;z-index:1;">
        <span class="final-score" id="resultado-final">0 <span class="final-den">/ 10</span></span>
      </div>
      <p class="final-label">respostas corretas</p>
    </div>

    <div id="resultado-barra" class="barra"></div>

    <div class="final-footer">
      <div class="ia-sep">
        <div class="ia-line"></div>
        <span class="ia-txt">Análise por IA</span>
        <div class="ia-line"></div>
      </div>
      <div id="feedback-ia" class="feedback-ia">
        <span class="typing-dots"><span></span><span></span><span></span></span>
      </div>
      <button id="btn-reiniciar-final" class="btn-reiniciar-final">↺ JOGAR NOVAMENTE</button>
    </div>

  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
